l_english:
 agot_bank_dashboard_decision: "Open Bank Dashboard"
 agot_bank_dashboard_decision_desc: "Open a bank dashboard linked to AGOT banking data, with investor visibility and manager controls."
 agot_bank_dashboard_decision_confirm: "Open Dashboard"

 agot_bank_dashboard.0001.t: "Select Bank"
 agot_bank_dashboard.0001.desc: "Choose which bank dashboard to open. You can inspect any bank where you are a shareholder. Management controls are only available for the current director."
 agot_bank_dashboard.0001.a: "The Iron Bank of Braavos"
 agot_bank_dashboard.0001.b: "Open Bank #1"
 agot_bank_dashboard.0001.c: "Open Bank #2"
 agot_bank_dashboard.0001.d: "Open Bank #3"
 agot_bank_dashboard.0001.e: "Close"

 agot_bank_dashboard.0010.t: "Bank Dashboard"
 agot_bank_dashboard.0010.desc: "A consolidated AGOT dashboard for this bank: current cash, loan pressure, default pressure, and policy posture."
 agot_bank_dashboard.0010.a: "View current KPIs"
 agot_bank_dashboard.0010.b: "Open policy insights"
 agot_bank_dashboard.0010.c: "Bank Policy & Management"
 agot_bank_dashboard.0010.f: "Close"

 agot_bank_dashboard.0020.t: "Policy Controls"
 agot_bank_dashboard.0020.desc: "Review all available policies below, then apply the one you want. The dashboard on the left shows expected impact for each option. Only the Director can apply changes."
 agot_bank_dashboard.0020.a: "Interest: Low Rate"
 agot_bank_dashboard.0020.b: "Interest: Medium Rate"
 agot_bank_dashboard.0020.c: "Interest: High Rate"
 agot_bank_dashboard.0020.d: "Loans: Restrictive"
 agot_bank_dashboard.0020.e: "Loans: Balanced"
 agot_bank_dashboard.0020.f: "Loans: Aggressive"
 agot_bank_dashboard.0020.g: "Dividends: High Payout"
 agot_bank_dashboard.0020.h: "Dividends: Balanced"
 agot_bank_dashboard.0020.i: "Dividends: Reinvest"
 agot_bank_dashboard.0020.j: "Back to Dashboard"
 agot_bank_dashboard.0020.k: "Close"

 agot_bank_dashboard.0021.t: "Interest Rate"
 agot_bank_dashboard.0021.desc: "#bold Low:#! #good +Demand, -Margin per loan, safer defaults#!\n#bold Medium:#! Balanced demand and margin — stable baseline\n#bold High:#! #warning -Demand, +Margin, +Default pressure (high variance)#!\n\nRange: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% a [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!"
 agot_bank_dashboard.0021.a: "Apply: Low Interest"
 agot_bank_dashboard.0021.b: "Apply: Medium Interest"
 agot_bank_dashboard.0021.c: "Apply: High Interest"
 agot_bank_dashboard.0021.d: "Back to Insights"
 agot_bank_dashboard.0021.e: "Close"

 agot_bank_dashboard.0022.t: "Loan Approval"
 agot_bank_dashboard.0022.desc: "#bold Restrictive:#! #good -Volume, -Default risk, stable profitability#!\n#bold Balanced:#! Standard mix for most world states\n#bold Aggressive:#! #warning +Volume, +Default exposure, wider swings#!\n\nRange: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% a [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!"
 agot_bank_dashboard.0022.a: "Apply: Restrictive"
 agot_bank_dashboard.0022.b: "Apply: Balanced"
 agot_bank_dashboard.0022.c: "Apply: Aggressive"
 agot_bank_dashboard.0022.d: "Back to Insights"
 agot_bank_dashboard.0022.e: "Close"

 agot_bank_dashboard.0023.t: "Dividends"
 agot_bank_dashboard.0023.desc: "#bold High Payout:#! #good +Investor satisfaction, -Reinvestment speed#!\n#bold Balanced:#! Middle ground between growth and stability\n#bold Reinvest:#! #warning +Growth potential, -Investor short-term happiness#!\n\nRange: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% a [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!"
 agot_bank_dashboard.0023.a: "Apply: High Payout"
 agot_bank_dashboard.0023.b: "Apply: Balanced"
 agot_bank_dashboard.0023.c: "Apply: Reinvest"
 agot_bank_dashboard.0023.d: "Back to Insights"
 agot_bank_dashboard.0023.e: "Close"

 agot_bank_dashboard.0030.t: "Manager Policy Controls"
 agot_bank_dashboard.0030.desc: "Apply a policy profile to this bank. These options write directly into AGOT bank globals (risk, dividend, and interest levels)."
 agot_bank_dashboard.0030.a: "Apply Safe profile"
 agot_bank_dashboard.0030.b: "Apply Growth profile"
 agot_bank_dashboard.0030.c: "Apply Aggressive profile"
 agot_bank_dashboard.0030.d: "Back to dashboard"

 agot_bank_dashboard_summary_ib_tt: "#P The Iron Bank of Braavos#!\nFree capital: [ROOT.Var('agot_dash_bank_cash').GetValue|0]\nLoaned capital: [ROOT.Var('agot_dash_bank_loaned').GetValue|0]\nBank value: [ROOT.Var('agot_dash_bank_value').GetValue|0]\nYour shares: [ROOT.Var('agot_dash_player_shares').GetValue|0] / [ROOT.Var('agot_dash_bank_shares_total').GetValue|0]\nShare value: [ROOT.Var('agot_dash_bank_value_per_share').GetValue|0]\n\nLoans issued: [ROOT.Var('agot_dash_bank_loans').GetValue|0]\nDefaults: [ROOT.Var('agot_dash_bank_defaults').GetValue|0]\nLost loans: [ROOT.Var('agot_dash_bank_lost_loans').GetValue|0]\nEarnings: [ROOT.Var('agot_dash_bank_earnings').GetValue|0]\nExpenses: [ROOT.Var('agot_dash_bank_expenses').GetValue|0]\n\nInterest level: [ROOT.Var('agot_dash_bank_interest').GetValue|0]\nRisk level: [ROOT.Var('agot_dash_bank_risk').GetValue|0]\nDividend level: [ROOT.Var('agot_dash_bank_dividend').GetValue|2]"
 agot_bank_dashboard_summary_bank1_tt: "#P Bank #1#!\nFree capital: [ROOT.Var('agot_dash_bank_cash').GetValue|0]\nLoaned capital: [ROOT.Var('agot_dash_bank_loaned').GetValue|0]\nBank value: [ROOT.Var('agot_dash_bank_value').GetValue|0]\nYour shares: [ROOT.Var('agot_dash_player_shares').GetValue|0] / [ROOT.Var('agot_dash_bank_shares_total').GetValue|0]\nShare value: [ROOT.Var('agot_dash_bank_value_per_share').GetValue|0]\n\nLoans issued: [ROOT.Var('agot_dash_bank_loans').GetValue|0]\nDefaults: [ROOT.Var('agot_dash_bank_defaults').GetValue|0]\nLost loans: [ROOT.Var('agot_dash_bank_lost_loans').GetValue|0]\nEarnings: [ROOT.Var('agot_dash_bank_earnings').GetValue|0]\nExpenses: [ROOT.Var('agot_dash_bank_expenses').GetValue|0]\n\nInterest level: [ROOT.Var('agot_dash_bank_interest').GetValue|0]\nRisk level: [ROOT.Var('agot_dash_bank_risk').GetValue|0]\nDividend level: [ROOT.Var('agot_dash_bank_dividend').GetValue|2]"
 agot_bank_dashboard_summary_bank2_tt: "#P Bank #2#!\nFree capital: [ROOT.Var('agot_dash_bank_cash').GetValue|0]\nLoaned capital: [ROOT.Var('agot_dash_bank_loaned').GetValue|0]\nBank value: [ROOT.Var('agot_dash_bank_value').GetValue|0]\nYour shares: [ROOT.Var('agot_dash_player_shares').GetValue|0] / [ROOT.Var('agot_dash_bank_shares_total').GetValue|0]\nShare value: [ROOT.Var('agot_dash_bank_value_per_share').GetValue|0]\n\nLoans issued: [ROOT.Var('agot_dash_bank_loans').GetValue|0]\nDefaults: [ROOT.Var('agot_dash_bank_defaults').GetValue|0]\nLost loans: [ROOT.Var('agot_dash_bank_lost_loans').GetValue|0]\nEarnings: [ROOT.Var('agot_dash_bank_earnings').GetValue|0]\nExpenses: [ROOT.Var('agot_dash_bank_expenses').GetValue|0]\n\nInterest level: [ROOT.Var('agot_dash_bank_interest').GetValue|0]\nRisk level: [ROOT.Var('agot_dash_bank_risk').GetValue|0]\nDividend level: [ROOT.Var('agot_dash_bank_dividend').GetValue|2]"
 agot_bank_dashboard_summary_bank3_tt: "#P Bank #3#!\nFree capital: [ROOT.Var('agot_dash_bank_cash').GetValue|0]\nLoaned capital: [ROOT.Var('agot_dash_bank_loaned').GetValue|0]\nBank value: [ROOT.Var('agot_dash_bank_value').GetValue|0]\nYour shares: [ROOT.Var('agot_dash_player_shares').GetValue|0] / [ROOT.Var('agot_dash_bank_shares_total').GetValue|0]\nShare value: [ROOT.Var('agot_dash_bank_value_per_share').GetValue|0]\n\nLoans issued: [ROOT.Var('agot_dash_bank_loans').GetValue|0]\nDefaults: [ROOT.Var('agot_dash_bank_defaults').GetValue|0]\nLost loans: [ROOT.Var('agot_dash_bank_lost_loans').GetValue|0]\nEarnings: [ROOT.Var('agot_dash_bank_earnings').GetValue|0]\nExpenses: [ROOT.Var('agot_dash_bank_expenses').GetValue|0]\n\nInterest level: [ROOT.Var('agot_dash_bank_interest').GetValue|0]\nRisk level: [ROOT.Var('agot_dash_bank_risk').GetValue|0]\nDividend level: [ROOT.Var('agot_dash_bank_dividend').GetValue|2]"

 agot_bank_dashboard_interest_low_tt: "#P Low Interest (preview)#!\nExpected: more clients, lower margin per loan, lower default pressure.\nProjected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: in wartime, low interest can capture higher demand quickly.#!"
 agot_bank_dashboard_interest_mid_tt: "#P Medium Interest (preview)#!\nExpected: balanced demand and margin.\nProjected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: best stability when defaults start rising.#!"
 agot_bank_dashboard_interest_high_tt: "#N High Interest (preview)#!\nExpected: fewer clients, higher margin per loan, higher default pressure.\nProjected 12-month range: #N [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: can spike profits during high war demand, but downside expands if debtors are weak.#!"

 agot_bank_dashboard_cat_interest_tt: "#bold Interest Rate Policy#!\n\n#accent Low:#! +Demand, -Margin per loan, safer defaults\n#good Medium:#! Balanced demand and margin (stable baseline)\n#warning High:#! -Demand, +Margin, +Default pressure (high variance)\n\n#bold Projected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!#!\n#weak Click to select and apply an interest level.#!"
 agot_bank_dashboard_cat_loans_tt: "#bold Loan Approval Policy#!\n\n#accent Restrictive:#! -Volume, -Default risk, stable profitability\n#good Balanced:#! Standard mix for most world states\n#warning Aggressive:#! +Volume, +Default exposure, wider swings\n\n#bold Projected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!#!\n#weak Click to select and apply a loan approval level.#!"
 agot_bank_dashboard_cat_dividends_tt: "#bold Dividend Policy#!\n\n#accent High Payout:#! +Investor satisfaction, -Reinvestment speed\n#good Balanced:#! Middle ground between growth and stability\n#warning Reinvest:#! +Growth potential, -Investor short-term happiness\n\n#bold Projected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!#!\n#weak Click to select and apply a dividend level.#!"

 agot_bank_dashboard_loans_restrict_tt: "#P Loans: Restrictive (preview)#!\nExpected: lower loan volume, reduced default risk, stable profitability.\nProjected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: best when borrower quality is uncertain or economy is unstable.#!"
 agot_bank_dashboard_loans_balanced_tt: "#P Loans: Balanced (preview)#!\nExpected: standard loan volume, moderate default exposure.\nProjected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: reliable baseline for most world states.#!"
 agot_bank_dashboard_loans_aggressive_tt: "#N Loans: Aggressive (preview)#!\nExpected: high loan volume, increased default exposure, wider profit swings.\nProjected 12-month range: #N [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: high reward but dangerous during political instability.#!"

 agot_bank_dashboard_dividend_high_tt: "#P Dividend: High Payout (preview)#!\nExpected: increased investor satisfaction, slower capital reinvestment.\nProjected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: good for attracting new shareholders.#!"
 agot_bank_dashboard_dividend_balanced_tt: "#P Dividend: Balanced (preview)#!\nExpected: moderate payouts, moderate reinvestment pace.\nProjected 12-month range: #P [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: stable default for most conditions.#!"
 agot_bank_dashboard_dividend_reinvest_tt: "#N Dividend: Reinvest (preview)#!\nExpected: low short-term investor satisfaction, high long-term growth potential.\nProjected 12-month range: #N [GetPlayer.Var('agot_dash_project_min').GetValue|0]% to [GetPlayer.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: best when expanding the bank's lending capacity.#!"

 agot_bank_dashboard_policy_safe_tt: "Applied Safe profile.\nRisk: low (3), Interest: medium (0), Dividend: balanced (0.75)."
 agot_bank_dashboard_policy_growth_tt: "Applied Growth profile.\nRisk: medium (6), Interest: low (-1), Dividend: reinvest-leaning (0.50)."
 agot_bank_dashboard_policy_aggressive_tt: "Applied Aggressive profile.\nRisk: high (18), Interest: high (1), Dividend: heavy reinvestment (0.25)."

