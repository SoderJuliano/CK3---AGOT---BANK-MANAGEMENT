 agot_bank_dashboard_interest_low_tt: "#P Low Interest (preview)#!\nExpected: more clients, lower margin per loan, lower default pressure.\nProjected 12-month range: #P [ROOT.Var('agot_dash_project_min').GetValue|0]% to [ROOT.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: in wartime, low interest can capture higher demand quickly.#!"
 agot_bank_dashboard_interest_mid_tt: "#P Medium Interest (preview)#!\nExpected: balanced demand and margin.\nProjected 12-month range: #P [ROOT.Var('agot_dash_project_min').GetValue|0]% to [ROOT.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: best stability when defaults start rising.#!"
 agot_bank_dashboard_interest_high_tt: "#N High Interest (preview)#!\nExpected: fewer clients, higher margin per loan, higher default pressure.\nProjected 12-month range: #N [ROOT.Var('agot_dash_project_min').GetValue|0]% to [ROOT.Var('agot_dash_project_max').GetValue|0]%#!\n#weak Hint: can spike profits during high war demand, but downside expands if debtors are weak.#!"

 agot_bank_dashboard_policy_safe_tt: "Applied Safe profile.\nRisk: low (3), Interest: medium (0), Dividend: balanced (0.75)."
 agot_bank_dashboard_policy_growth_tt: "Applied Growth profile.\nRisk: medium (6), Interest: low (-1), Dividend: reinvest-leaning (0.50)."
 agot_bank_dashboard_policy_aggressive_tt: "Applied Aggressive profile.\nRisk: high (18), Interest: high (1), Dividend: heavy reinvestment (0.25)."

