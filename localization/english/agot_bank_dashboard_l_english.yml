l_english:
 agot_bank_dashboard_decision: "Open Bank Dashboard"
 agot_bank_dashboard_decision_desc: "Open a bank dashboard linked to AGOT banking data, with investor visibility and manager controls."
 agot_bank_dashboard_decision_confirm: "Open Dashboard"

 agot_bank_dashboard.0001.t: "Select Bank"
 agot_bank_dashboard.0001.desc: "Choose which bank dashboard to open. You can inspect any bank where you are a shareholder. Management controls are only available for the current director."
 agot_bank_dashboard.0001.a: "The Iron Bank of Braavos"
 agot_bank_dashboard.0001.b: "Open Bank #1"
 agot_bank_dashboard.0001.c: "Open Bank #2"
 agot_bank_dashboard.0001.d: "Open Bank #3"
 agot_bank_dashboard.0001.e: "Close"

 agot_bank_dashboard.0010.t: "Bank Dashboard"
 agot_bank_dashboard.0010.desc: "A consolidated AGOT dashboard for this bank: current cash, loan pressure, default pressure, and policy posture."
 agot_bank_dashboard.0010.a: "View current KPIs"
 agot_bank_dashboard.0010.b: "Open policy insights"
 agot_bank_dashboard.0010.c: "Bank Policy & Management"
 agot_bank_dashboard.0010.f: "Close"

 agot_bank_dashboard.0020.t: "Policy Insights"
 agot_bank_dashboard.0020.desc: "Select a policy to apply to this bank. Apply options are only available to the Director."
 agot_bank_dashboard.0020.a: "Interest: Low"
 agot_bank_dashboard.0020.b: "Interest: Medium"
 agot_bank_dashboard.0020.c: "Interest: High"
 agot_bank_dashboard.0020.d: "Loans: Restrictive"
 agot_bank_dashboard.0020.e: "Loans: Balanced"
 agot_bank_dashboard.0020.f: "Loans: Aggressive"
 agot_bank_dashboard.0020.g: "Dividend: High payout"
 agot_bank_dashboard.0020.h: "Dividend: Balanced"
 agot_bank_dashboard.0020.i: "Dividend: Reinvest"
 agot_bank_dashboard.0020.j: "Back to dashboard"
 agot_bank_dashboard.0020.k: "Close"

 agot_bank_dashboard.0030.t: "Manager Policy Controls"
 agot_bank_dashboard.0030.desc: "Apply a policy profile to this bank. These options write directly into AGOT bank globals (risk, dividend, and interest levels)."
 agot_bank_dashboard.0030.a: "Apply Safe profile"
 agot_bank_dashboard.0030.b: "Apply Growth profile"
 agot_bank_dashboard.0030.c: "Apply Aggressive profile"
 agot_bank_dashboard.0030.d: "Back to dashboard"

